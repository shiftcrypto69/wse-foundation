<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSE // FOUNDATION</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <div class="dot"></div>
            <span>WSE FOUNDATION <span class="dim">/ SIM</span></span>
        </div>
    </nav>

    <main class="container">
        <header class="hero">
            <h1>THE BRAND <br> <span class="gold">TRIGGER.</span></h1>
            <p class="subtitle">Real-time predictive analysis for high-velocity digital assets.</p>
        </header>

        <div class="search-box">
            <input type="text" id="brandInput" placeholder="Enter branding concept..." onkeypress="handleKey(event)">
            <button onclick="runAnalysis()" id="btn">Run Analysis</button>
        </div>

        <div id="results" class="results-grid" style="display: none;">
            <div class="card wide">
                <span class="label">Social Trend Velocity</span>
                <div class="stats">
                    <span class="val" id="trendVal">0</span><span class="unit">%</span>
                </div>
                <div class="progress-bg"><div id="bar" class="progress-fill"></div></div>
            </div>

            <div class="card">
                <span class="label">Asset Liquidity</span>
                <div class="val" id="volVal">0M</div>
                <span class="status-up">▲ Trending</span>
            </div>

            <div class="card">
                <span class="label">Domain Status</span>
                <div id="domStatus" class="val-sm">Checking...</div>
            </div>

            <div class="card wide overflow-hidden">
                <span class="label">Regional Heatmap</span>
                <div class="heatmap" id="heatmap">
                    <!-- JS generated regions -->
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
