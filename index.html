<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSE // BRAND SIMULATOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e5e5e5; }
        [x-cloak] { display: none !important; }
        .dune-card { background: rgba(15, 15, 15, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-input { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-input:focus { border-color: #3b82f6; outline: none; background: rgba(255, 255, 255, 0.05); }
        .trending-bar { transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body x-data="brandEngine()" class="antialiased min-h-screen pb-20">

    <!-- NAVIGATION (Minimalist) -->
    <nav class="border-b border-white/5 py-6 px-8 flex justify-between items-center sticky top-0 bg-[#050505]/80 backdrop-blur-md z-50">
        <div class="flex items-center space-x-4">
            <div class="h-3 w-3 bg-blue-500 rounded-full shadow-[0_0_10px_#3b82f6]"></div>
            <span class="text-xs font-black tracking-[0.3em] uppercase text-white">World Smart Eye <span class="text-gray-500">/ SIM</span></span>
        </div>
        <div class="hidden md:flex space-x-8 text-[10px] font-bold uppercase tracking-widest text-gray-500">
            <a href="#" class="hover:text-white transition-colors">Trends</a>
            <a href="#" class="hover:text-white transition-colors">Liquidity</a>
            <a href="#" class="hover:text-white transition-colors">Nodes</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-8 pt-20">
        
        <!-- HERO SECTION -->
        <header class="mb-16">
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter mb-4 text-white leading-none">
                THE BRAND <br> <span class="text-blue-500">TRIGGER.</span>
            </h1>
            <p class="text-gray-400 max-w-md text-sm font-light leading-relaxed">
                Real-time predictive analysis for digital assets, social trends, and high-velocity domain branding.
            </p>
        </header>

        <!-- INPUT ENGINE -->
        <section class="mb-12">
            <div class="flex flex-col md:flex-row gap-2">
                <input type="text" x-model="brandInput" @keyup.enter="analyze()" 
                       placeholder="Enter branding concept (e.g. 'CyberCore')" 
                       class="glass-input flex-1 rounded-full px-8 py-5 text-lg font-medium text-white transition-all">
                <button @click="analyze()" 
                        class="bg-white text-black px-10 py-5 rounded-full font-black uppercase text-xs tracking-widest hover:bg-blue-500 hover:text-white transition-all disabled:opacity-50"
                        :disabled="loading || !brandInput">
                    <span x-show="!loading">Run Analysis</span>
                    <span x-show="loading">Scanning...</span>
                </button>
            </div>
        </section>

        <!-- RESULTS GRID (Dune SIM Style) -->
        <div x-show="showResult" x-cloak x-transition.opacity.duration.500ms class="grid grid-cols-1 md:grid-cols-12 gap-4">
            
            <!-- Trend Velocity Card -->
            <div class="md:col-span-8 dune-card rounded-[2rem] p-10 flex flex-col justify-between">
                <div>
                    <h4 class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-8">Social Trend Velocity</h4>
                    <div class="flex items-end space-x-2 mb-2">
                        <span class="text-6xl font-black text-white" x-text="trendScore">0</span>
                        <span class="text-2xl font-bold text-blue-500 mb-2">%</span>
                    </div>
                </div>
                <div class="w-full bg-white/5 h-1 rounded-full mt-8 overflow-hidden">
                    <div class="trending-bar h-full bg-blue-500" :style="`width: ${trendScore}%` "></div>
                </div>
            </div>

            <!-- Market Status Card -->
            <div class="md:col-span-4 dune-card rounded-[2rem] p-10 flex flex-col justify-between">
                <div>
                    <h4 class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-8">Asset Liquidity</h4>
                    <div class="text-4xl font-black text-white mb-2" x-text="volume">0M</div>
                    <p class="text-[10px] text-green-500 font-bold uppercase">Trending Up ▲</p>
                </div>
                <div class="pt-8 border-t border-white/5">
                    <p class="text-[10px] font-bold text-gray-500 uppercase mb-2">Domain (.COM)</p>
                    <div class="text-xs font-black uppercase tracking-widest" :class="isAvailable ? 'text-green-500' : 'text-red-500'" x-text="isAvailable ? 'Status: Available' : 'Status: Taken'"></div>
                </div>
            </div>

            <!-- Global Map Simulation (Fashion-Tech) -->
            <div class="md:col-span-12 dune-card rounded-[2rem] p-10 mt-4 overflow-hidden relative min-h-[300px]">
                <h4 class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-8">Global Adoption Heatmap</h4>
                <div class="absolute inset-0 opacity-20 flex items-center justify-center">
                    <!-- SVG Simulation -->
                    <svg viewBox="0 0 800 400" class="w-full h-full stroke-blue-500 fill-none opacity-30">
                        <path d="M100 200 Q 400 100 700 200 T 100 200" stroke-width="0.5" class="animate-pulse" />
                        <circle cx="400" cy="200" r="100" stroke-width="0.2" />
                    </svg>
                </div>
                <div class="relative z-10 grid grid-cols-2 md:grid-cols-4 gap-8">
                    <template x-for="region in regions">
                        <div>
                            <p class="text-[9px] font-bold text-gray-600 uppercase" x-text="region.name"></p>
                            <p class="text-xl font-bold text-white" x-text="region.val + '%'"></p>
                        </div>
                    </template>
                </div>
            </div>

        </div>

    </main>

    <script>
        function brandEngine() {
            return {
                brandInput: '',
                loading: false,
                showResult: false,
                trendScore: 0,
                volume: '0M',
                isAvailable: false,
                regions: [
                    { name: 'North America', val: 0 },
                    { name: 'Europe', val: 0 },
                    { name: 'Asia Pacific', val: 0 },
                    { name: 'Middle East', val: 0 }
                ],

                analyze() {
                    if(!this.brandInput) return;
                    this.loading = true;
                    this.showResult = false;

                    // Simulate API Delay
                    setTimeout(() => {
                        this.trendScore = Math.floor(Math.random() * 45 + 50);
                        this.volume = (Math.random() * 12 + 1).toFixed(1) + "M";
                        this.isAvailable = Math.random() > 0.4;
                        
                        this.regions.forEach(r => {
                            r.val = Math.floor(Math.random() * 80 + 10);
                        });

                        this.loading = false;
                        this.showResult = true;
                    }, 1200);
                }
            }
        }
    </script>
</body>
</html>
